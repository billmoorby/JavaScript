<!DOCTYPE html>
<html>
  <head>
    <title>18f</title>
  </head>

  <body>
    <!-- Should get CORS(Cross-Origin Resource Sharing) error. Meaning the URL code is runnign on is different than Amazon's backend. -->
    <script>
      async function getAmazon() {
        try {
          const response = await fetch('https://amazon.com');
          const text = await response.text();
          console.log(text);
        } catch (error) {
          console.log('CORS error. Your request was blocked by the backend.');
        }
      };
      getAmazon();
    </script>
  </body>
</html>
